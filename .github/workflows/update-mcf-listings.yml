name: Update MyCareersFuture Listings

on:
  workflow_dispatch:
  schedule:
    # Runs every Monday at 00:15 Singapore time.
    - cron: "15 16 * * 0"

permissions:
  contents: write

concurrency:
  group: update-mcf-listings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pull latest public MyCareersFuture listings
        run: node pull-mcf.mjs --pages 25 --limit 100 --max-rows 2500 --out mcf-listings.csv

      - name: Commit updated CSV
        run: |
          if git diff --quiet -- mcf-listings.csv; then
            echo "No CSV changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mcf-listings.csv
          git commit -m "Update MyCareersFuture listings"
          git push
