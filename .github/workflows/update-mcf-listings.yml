name: Update MyCareersFuture Listings

on:
  workflow_dispatch:
  schedule:
    - cron: "15 16 * * 0"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node pull-mcf.mjs --pages 3 --limit 20 --max-rows 300 --out mcf-listings.csv
      - run: |
          if git diff --quiet -- mcf-listings.csv; then
            echo "No CSV changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mcf-listings.csv
          git commit -m "Update MyCareersFuture listings"
          git push
